<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <!--
    Maverick Guitars 2002 — crack-overlay.svg
    Place in /public/textures/crack-overlay.svg

    Used as a mix-blend-mode: multiply overlay on model name display text
    (.distressed-text-wrap::after in components.css) to simulate the
    eroded/cracked letterform treatment used in the catalogue.

    The feTurbulence filter generates a fractal noise pattern that
    approximates the cracked dry-earth texture background.
    The feColorMatrix desaturates it and feComponentTransfer sharpens
    the contrast to produce hard crack-like edges rather than soft noise.
  -->
  <filter id="crack-filter" x="0%" y="0%" width="100%" height="100%"
          color-interpolation-filters="sRGB">
    <!-- Base noise layer — fine, high frequency -->
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.7 0.5"
      numOctaves="5"
      seed="42"
      stitchTiles="stitch"
      result="noise" />

    <!-- Desaturate to greyscale -->
    <feColorMatrix
      type="saturate"
      values="0"
      in="noise"
      result="grey" />

    <!-- Threshold to hard cracks — pushes mid-tones to black/white -->
    <feComponentTransfer in="grey" result="thresholded">
      <feFuncR type="discrete" tableValues="0 0 0 0 0 1 1 1" />
      <feFuncG type="discrete" tableValues="0 0 0 0 0 1 1 1" />
      <feFuncB type="discrete" tableValues="0 0 0 0 0 1 1 1" />
    </feComponentTransfer>

    <!-- Blend with original noise for softer edges -->
    <feBlend in="thresholded" in2="grey" mode="multiply" result="blended" />

    <!-- Final contrast boost -->
    <feColorMatrix
      type="matrix"
      values="2 0 0 0 -0.5
              0 2 0 0 -0.5
              0 0 2 0 -0.5
              0 0 0 1 0"
      in="blended" />
  </filter>

  <rect width="100%" height="100%" filter="url(#crack-filter)" />
</svg>
